<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PEDA NIGHT - Juego para Pedas</title>
  <meta name="description" content="Juego web interactivo para beber en fiestas con tres niveles de intensidad." />
  <style>
    :root {
      --bg-1: #06080f;
      --bg-2: #0f1425;
      --card: rgba(15, 20, 37, 0.85);
      --text: #eaf0ff;
      --muted: #9fb2d9;
      --neon-purple: #b026ff;
      --neon-blue: #00b7ff;
      --neon-green: #39ff87;
      --danger: #ff4d7e;
      --radius: 20px;
      --shadow-neon: 0 0 0.6rem rgba(176, 38, 255, 0.5), 0 0 1.2rem rgba(0, 183, 255, 0.35);
      --shadow-card: 0 16px 44px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(176, 38, 255, 0.2), transparent 34%),
        radial-gradient(circle at 90% 20%, rgba(0, 183, 255, 0.2), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(57, 255, 135, 0.1), transparent 38%),
        linear-gradient(165deg, var(--bg-1), var(--bg-2));
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -1;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.25;
      pointer-events: none;
    }

    body::before {
      width: 260px;
      height: 260px;
      left: -70px;
      top: 18%;
      background: var(--neon-purple);
      animation: floaty 7s ease-in-out infinite;
    }

    body::after {
      width: 260px;
      height: 260px;
      right: -80px;
      bottom: 10%;
      background: var(--neon-blue);
      animation: floaty 9s ease-in-out infinite reverse;
    }

    @keyframes floaty {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-18px) scale(1.05); }
      100% { transform: translateY(0) scale(1); }
    }

    .app {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 20px 14px 24px;
    }

    .panel {
      width: min(720px, 100%);
      background: linear-gradient(160deg, rgba(10, 14, 28, 0.9), rgba(18, 28, 53, 0.8));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: var(--shadow-card), var(--shadow-neon);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(176, 38, 255, 0.35), transparent 35%, rgba(0, 183, 255, 0.35));
      opacity: 0.65;
      z-index: -1;
    }

    h1 {
      margin: 8px 0 4px;
      font-size: clamp(1.5rem, 4.7vw, 2.4rem);
      letter-spacing: 0.03em;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0, 183, 255, 0.45);
    }

    .subtitle {
      margin: 0 0 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .screen {
      display: none;
      animation: fadeIn 260ms ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .levels {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .level-btn,
    .action-btn,
    .ghost-btn {
      border: 0;
      border-radius: 16px;
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease, box-shadow 180ms ease;
    }

    .level-btn {
      text-align: left;
      background: linear-gradient(120deg, rgba(176, 38, 255, 0.76), rgba(0, 183, 255, 0.72));
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    .level-btn span {
      display: block;
      margin-top: 6px;
      font-size: 0.83rem;
      opacity: 0.9;
      font-weight: 500;
    }

    .level-btn:hover,
    .action-btn:hover,
    .ghost-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.07);
    }

    .level-btn:active,
    .action-btn:active,
    .ghost-btn:active {
      transform: translateY(1px);
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 6px 10px;
      width: fit-content;
    }

    .card-wrap {
      perspective: 1100px;
      margin: 10px 0 14px;
    }

    .card {
      min-height: 230px;
      border-radius: var(--radius);
      background:
        linear-gradient(165deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01)),
        linear-gradient(160deg, rgba(14, 22, 46, 0.92), rgba(8, 13, 27, 0.92));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow-card);
      padding: 20px 16px;
      display: grid;
      place-items: center;
      text-align: center;
      transform-style: preserve-3d;
      transition: transform 620ms cubic-bezier(0.2, 0.85, 0.2, 1), opacity 620ms;
    }

    .card.is-animating {
      opacity: 0.2;
      transform: rotateY(56deg) translateY(-4px);
    }

    .card p {
      margin: 0;
      line-height: 1.4;
      font-size: clamp(1.06rem, 4.3vw, 1.45rem);
      text-wrap: balance;
    }

    .action-btn {
      background: linear-gradient(115deg, var(--neon-green), var(--neon-blue));
      color: #04131e;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      box-shadow: 0 10px 22px rgba(57, 255, 135, 0.35);
      font-size: 1.05rem;
    }

    .footer-actions {
      margin-top: 10px;
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
    }

    .ghost-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--muted);
      font-weight: 600;
    }

    .warning {
      margin-top: 14px;
      text-align: center;
      font-size: 0.75rem;
      color: #c0c9df;
      opacity: 0.85;
    }

    @media (min-width: 700px) {
      .panel {
        padding: 26px;
      }

      .footer-actions {
        grid-template-columns: 2fr 1fr;
      }

      .card {
        min-height: 270px;
        padding: 28px 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel" aria-live="polite">
      <section id="startScreen" class="screen active" aria-labelledby="titulo-principal">
        <header>
          <h1 id="titulo-principal">PEDA NIGHT</h1>
          <p class="subtitle">Elige tu nivel y prepárate para el caos social.</p>
        </header>

        <div class="levels" role="list" aria-label="Niveles de intensidad">
          <button class="level-btn" data-level="1" role="listitem">
            Nivel 1: Precopeo (Tranquilo)
            <span>Hielo, risas y verdades leves para arrancar.</span>
          </button>
          <button class="level-btn" data-level="2" role="listitem">
            Nivel 2: Entrando en Calor (Intermedio)
            <span>Yo nunca nunca, votaciones y mini reglas.</span>
          </button>
          <button class="level-btn" data-level="3" role="listitem">
            Nivel 3: Modo Destrucción (Pesado)
            <span>Retos atrevidos, shots y exposición total.</span>
          </button>
        </div>

        <p class="warning">Juega con responsabilidad. Si alguien no quiere hacer un reto, se respeta.</p>
      </section>

      <section id="gameScreen" class="screen" aria-labelledby="nivel-actual" aria-hidden="true">
        <div class="hud">
          <div class="chip" id="nivel-actual">Nivel seleccionado: -</div>
          <div class="chip" id="contador">Reto #1</div>
        </div>

        <div class="card-wrap">
          <article class="card" id="retoCard">
            <p id="retoTexto">Tu reto aparecerá aquí.</p>
          </article>
        </div>

        <div class="footer-actions">
          <button class="action-btn" id="nextBtn">Siguiente Trago</button>
          <button class="ghost-btn" id="backBtn">Cambiar Nivel</button>
        </div>

        <p class="warning">Si un reto rompe límites personales, cámbialo sin presión. La idea es divertirse.</p>
      </section>
    </section>
  </main>

  <script>
    // Reemplaza tus arreglos antiguos con estos nuevos masivos
    const nuevasPreguntasNivel1 = [
      "Probabilidades del 1 al 10: que hoy alguien diga 'ya me voy' y se quede dos horas mas.",
      "Rompehielo: cual fue la materia mas inutil que llevaste en la uni, pero pasaste de milagro.",
      "Cultura pop: menciona 3 canciones de Peso Pluma en menos de 8 segundos o toma 1 trago.",
      "Debate express: tacos de asada o pastor para bajon de peda, convence al grupo en 20 segundos.",
      "Verdad leve: que red flag tuya descubrieron tus amigos antes que tu.",
      "Probabilidades: que te hayas enamorado de alguien solo porque te respondio rapido.",
      "Cultura general: en que ano empezo la pandemia en Mexico, sin google. Si fallas, trago.",
      "Rompehielo: cuenta tu peor excusa para llegar tarde a clase.",
      "Debate universitario: examen final en equipo o tesis individual, que da mas miedo.",
      "Cultura pop: di 2 canciones de Junior H y 2 de Fuerza Regida; si te trabas, trago.",
      "Verdad leve: cual fue tu gasto mas no mames en una peda reciente.",
      "Probabilidades: que hoy se arme plan post-peda de tacos a las 3 a.m.",
      "Cultura general: cual es la capital de Jalisco. Si no sabes, trago con humildad.",
      "Rompehielo: que apodo te pusieron en prepa/uni y por que.",
      "Debate: team reggaeton viejo o corridos tumbados para arrancar la fiesta.",
      "Verdad leve: que mentira blanca dices para cancelar planes.",
      "Probabilidades: que alguien aqui aun deba copias, pasajes o una tanda.",
      "Cultura pop: menciona 3 memes clasicos mexicanos que sigan vivos.",
      "Rompehielo: describe tu cruda ideal con solo 3 palabras.",
      "Debate: cafe para sobrevivir clases de 7 a.m. o desvelo con energia de fe.",
      "Verdad leve: cual fue tu peor decision academica por flojera.",
      "Probabilidades: que alguien aqui haya llorado por una cancion de reggaeton.",
      "Cultura general: cuantos estados tiene Mexico. Si fallas, 1 trago.",
      "Rompehielo: que carrera habrias elegido si el dinero no importara.",
      "Debate: quien miente mas, el profe con el 'es facil' o el compa con 'ya casi termino'.",
      "Verdad leve: que habito tuyo te delata cuando ya andas medio happy.",
      "Probabilidades: que alguien se quede dormido viendo una serie y diga que 'si la vio'.",
      "Cultura pop: menciona una pelicula mexicana que todos deban ver minimo una vez.",
      "Rompehielo: si tu semestre fuera una cancion, cual seria y por que.",
      "Debate: mejor plan de viernes, antro caro o casa con bocina y buena carrilla.",
      "Verdad leve: cual fue tu peor compra en una app de delivery con hambre de madrugada.",
      "Probabilidades: que alguien hoy se confunda de nombre contando un chisme.",
      "Cultura general: quien pinto la Mona Lisa. Si te equivocas, trago artistico."
    ];

    const nuevasPreguntasNivel2 = [
      "Yo nunca nunca: he copiado en un examen y luego saque mejor calificacion que el que estudio.",
      "Yo nunca nunca: he dicho 'ya casi llego' cuando ni me habia metido a banar.",
      "Yo nunca nunca: me hice el dormido para no contestar un problema.",
      "Votacion: quien es mas probable que sobreviva una semana con 200 pesos.",
      "Votacion: quien es mas probable que se enamore por una playlist bien hecha.",
      "Regla temporal (3 rondas): queda prohibido decir 'no mames'; quien lo diga toma 1.",
      "Yo nunca nunca: he vuelto con alguien sabiendo perfectamente que era mala idea.",
      "Votacion: quien seria el primero en renunciar si le piden tesis + practicas + vida social.",
      "Regla temporal (2 rondas): todo comentario debe empezar con 'profesor, con todo respeto...'. Si no, trago.",
      "Yo nunca nunca: me hice amigo de alguien solo para pasar una materia.",
      "Votacion: quien da la mejor carrilla sin que se note mala vibra.",
      "Regla temporal (3 rondas): no se puede decir 'guey'; quien lo diga toma y explica su punto formalmente.",
      "Yo nunca nunca: he fingido entender un tema para no quedar como perdido.",
      "Votacion: quien tiene mas chance de caer en estafa por promo demasiado buena.",
      "Debate rapido: es peor ghostear o responder cada 8 horas con un 'jajaja'.",
      "Yo nunca nunca: he prometido 'solo una chela' y acabe viendo el amanecer.",
      "Votacion: quien tiene mas talento para inventar pretextos creibles.",
      "Regla temporal (2 rondas): no se puede usar ingles; cada anglicismo cuesta 1 trago.",
      "Yo nunca nunca: he ignorado red flags por pura necedad.",
      "Votacion: quien seria mas probable en perderse en un festival por ir por agua.",
      "Regla temporal (3 rondas): si alguien dice 'literal', toma 1.",
      "Yo nunca nunca: he hecho tarea cinco minutos antes de subirla.",
      "Votacion: quien pisaria el palito de un ex con solo un 'hola perdida/o'.",
      "Debate: que pesa mas en una relacion, responsabilidad afectiva o buen sentido del humor.",
      "Yo nunca nunca: he dado consejo amoroso que yo mismo no aplico.",
      "Votacion: quien seria mas probable en ser influencer accidental por un video random.",
      "Regla temporal (3 rondas): cada frase debe terminar con 'confirmo'; si no, trago.",
      "Yo nunca nunca: he culpado al trafico cuando en realidad sali tardisimo.",
      "Votacion: quien tiene el peor historial de deudas chiquitas tipo 'te pago al rato'.",
      "Debate universitario: examen sorpresa o exposicion improvisada, que trauma mas.",
      "Yo nunca nunca: he stalkeado tanto que ya sabia horarios, gustos y cafeteria favorita.",
      "Votacion: quien es mas probable que arme peda un martes y aun asi vaya a clase.",
      "Regla temporal (2 rondas): no se puede decir 'yo'; quien lo diga toma 1.",
      "Yo nunca nunca: he defendido una cancion malisima solo por nostalgia.",
      "Votacion: quien seria mas probable en ganar 'MasterChef de recalentado'."
    ];

    const nuevasPreguntasNivel3 = [
      "Confesion pesada: cual es la mentira mas grande que dijiste para evitar una conversacion incomoda.",
      "Verdad pesada: que patron toxico repites aunque sabes que te hace dano.",
      "Castigo: si no respondes con honestidad, toma 2 tragos y cedes el turno.",
      "Confesion: cuando fue la ultima vez que te sentiste estancado en la vida y por que.",
      "Verdad pesada: cual es tu mayor inseguridad en relaciones y como te afecta.",
      "Castigo de sinceridad: responde en menos de 10 segundos o shot completo.",
      "Confesion: que decision te sigue pesando de tu etapa universitaria.",
      "Verdad pesada: a quien le debes una disculpa real y por que no la has dado.",
      "Castigo: si das respuesta vaga tipo 'no se', toma 2 tragos.",
      "Confesion: cual ha sido tu red flag mas clara en una relacion pasada.",
      "Verdad pesada: que miedo te da mas, fracasar profesionalmente o quedarte solo.",
      "Castigo: el grupo decide si tu respuesta fue honesta; si no, shot.",
      "Confesion: cual fue tu momento mas 'no mames que hice eso' en una peda.",
      "Verdad pesada: que tipo de comentario te duele mas aunque finjas que no.",
      "Castigo: si te contradices durante la misma respuesta, toma 2 tragos.",
      "Confesion: que habito tuyo esta arruinando tu economia sin que lo aceptes.",
      "Verdad pesada: cual fue tu mayor acto de orgullo que te costo una relacion.",
      "Castigo: si dices 'paso', shot completo sin negociar.",
      "Confesion: cuando fue la ultima vez que te autosaboteaste y como.",
      "Verdad pesada: que tan seguido dices 'estoy bien' cuando claramente no lo estas.",
      "Castigo: si alguien del grupo detecta que evadiste, tomas 2.",
      "Confesion: que expectativa familiar/social te pesa mas en este momento.",
      "Verdad pesada: cual fue la ultima vez que pediste ayuda de verdad.",
      "Castigo: quien tarde mas en responder esta ronda toma 1 extra.",
      "Confesion: que cosa presumes pero en realidad te cuesta muchisimo sostener.",
      "Verdad pesada: que aprendiste de tu peor corazon roto, sin chistes.",
      "Castigo: respuesta menor a 5 palabras cuenta como evasiva, toma 2.",
      "Confesion: si hoy tuvieras que cerrar un ciclo, cual seria.",
      "Verdad pesada: que limite personal permitiste que cruzaran por no incomodar.",
      "Castigo: el grupo vota del 1 al 5 tu honestidad; si sacas menos de 3, shot.",
      "Confesion: que te da mas ansiedad de cumplir 25+ en Mexico hoy.",
      "Verdad pesada: cual es la deuda emocional que sigues cargando.",
      "Castigo: si usas la frase 'es complicado', tomas 1 inmediato.",
      "Confesion: que consejo das siempre pero tu aun no logras aplicar.",
      "Verdad pesada: quien crees que te conoce mejor y por que te cuesta mostrarte igual con otros."
    ];

    const gameData = {
      1: {
        name: "Precopeo (Tranquilo)",
        cards: nuevasPreguntasNivel1
      },
      2: {
        name: "Entrando en Calor (Intermedio)",
        cards: nuevasPreguntasNivel2
      },
      3: {
        name: "Modo Destruccion (Pesado)",
        cards: nuevasPreguntasNivel3
      }
    };

    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const levelButtons = document.querySelectorAll(".level-btn");
    const retoCard = document.getElementById("retoCard");
    const retoTexto = document.getElementById("retoTexto");
    const nextBtn = document.getElementById("nextBtn");
    const backBtn = document.getElementById("backBtn");
    const levelChip = document.getElementById("nivel-actual");
    const counterChip = document.getElementById("contador");

    let selectedLevel = null;
    let turnCount = 0;
    let lastCardIndex = -1;

    function randomIndex(max, disallow) {
      if (max <= 1) return 0;
      let index = Math.floor(Math.random() * max);
      while (index === disallow) {
        index = Math.floor(Math.random() * max);
      }
      return index;
    }

    function setScreen(showGame) {
      startScreen.classList.toggle("active", !showGame);
      gameScreen.classList.toggle("active", showGame);
      startScreen.setAttribute("aria-hidden", String(showGame));
      gameScreen.setAttribute("aria-hidden", String(!showGame));
    }

    function animateCard(newText) {
      retoCard.classList.add("is-animating");
      setTimeout(() => {
        retoTexto.textContent = newText;
        retoCard.classList.remove("is-animating");
      }, 280);
    }

    function nextCard() {
      const levelPack = gameData[selectedLevel];
      if (!levelPack) return;

      const idx = randomIndex(levelPack.cards.length, lastCardIndex);
      lastCardIndex = idx;
      turnCount += 1;
      counterChip.textContent = "Reto #" + turnCount;
      animateCard(levelPack.cards[idx]);
    }

    function startGame(level) {
      selectedLevel = level;
      turnCount = 0;
      lastCardIndex = -1;
      levelChip.textContent = "Nivel seleccionado: " + gameData[level].name;
      setScreen(true);
      nextCard();
    }

    levelButtons.forEach((btn) => {
      btn.addEventListener("click", () => startGame(btn.dataset.level));
    });

    nextBtn.addEventListener("click", nextCard);

    backBtn.addEventListener("click", () => {
      setScreen(false);
    });
  </script>
</body>
</html>
